{{define "polls.html"}}
{{template "header" .}}
<div class="card mb-3">
  <div class="card-header"><h2 class="h5 mb-0">{{t .Locale "polls.title"}}</h2></div>
  <div class="card-body">
  <p><a href="/menu">{{t .Locale "common.dashboard_back"}}</a></p>
  <ul class="compact-list">
  {{range .Polls}}
    <li><a href="/polls/view?id={{.ID}}">{{.Question}}</a></li>
  {{else}}
    <li class="meta">{{t .Locale "polls.empty"}}</li>
  {{end}}
  </ul>
  </div>
</div>
{{template "footer" .}}
{{end}}
